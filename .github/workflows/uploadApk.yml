name: Android Action Generated APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality_checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run unit tests, detekt and JaCoCo report
        run: ./gradlew testDebugUnitTest detekt jacocoTestReport

      - name: Validate minimum coverage (70%)
        run: |
          REPORT_PATH="app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "Coverage report not found at $REPORT_PATH"
            exit 1
          fi

          MATCH=$(grep -o 'counter type="LINE" missed="[0-9]*" covered="[0-9]*"' "$REPORT_PATH" | tail -n 1)
          if [ -z "$MATCH" ]; then
            echo "Could not parse line coverage counters from $REPORT_PATH"
            exit 1
          fi

          MISSED=$(echo "$MATCH" | sed -E 's/.*missed="([0-9]+)".*/\1/')
          COVERED=$(echo "$MATCH" | sed -E 's/.*covered="([0-9]+)".*/\1/')
          TOTAL=$((MISSED+COVERED))
          PCT=$(awk -v c="$COVERED" -v t="$TOTAL" 'BEGIN {printf "%.2f", (c/t)*100}')
          echo "Coverage: ${PCT}% (${COVERED}/${TOTAL})"
          awk -v pct="$PCT" 'BEGIN { exit (pct >= 70.0) ? 0 : 1 }'

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            app/build/reports/jacoco/jacocoTestReport/html

  upload_dev_apk:
    needs: quality_checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Create keystore.properties file
        run: echo "${{ secrets.JUST_VERONICA }}" > keystore.properties

      - name: JUST CHILL
        run: |
          mkdir -p key
          echo "${{ secrets.JUST_CHILL }}" | base64 --decode > key/just_chill_key.p12

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Release (assembleRelease)
        run: ./gradlew assembleRelease

      - name: Get Release APK path
        id: releaseApk
        run: |
          APK_PATH=$(ls -1 app/build/outputs/apk/release/*.apk | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found in app/build/outputs/apk/release"
            exit 1
          fi
          echo "release=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload release APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.FIREBASE_RELEASE_APP_ID}}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: Yolo
          file: ${{ steps.releaseApk.outputs.release }}
