name: Android Action Generated APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_build:
        description: Build and distribute release APK (slower)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  MIN_LINE_COVERAGE: "70.0"

jobs:
  quality_checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Validate Gradle Wrapper (non-blocking)
        id: wrapper_validation
        continue-on-error: true
        uses: gradle/actions/wrapper-validation@v3

      - name: Warn on wrapper validation failure
        if: steps.wrapper_validation.outcome == 'failure'
        run: |
          echo "::warning::Gradle wrapper validation failed due to runner network/connectivity. Continuing because this step is non-blocking in this workflow."

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run unit tests, detekt and JaCoCo report
        run: ./gradlew :app:detekt :app:jacocoTestReport

      - name: Validate minimum coverage (70%)
        run: |
          REPORT_PATH="app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "Coverage report not found at $REPORT_PATH"
            exit 1
          fi

          if command -v xmllint >/dev/null 2>&1; then
            MISSED=$(xmllint --xpath 'string(/report/counter[@type="LINE"]/@missed)' "$REPORT_PATH")
            COVERED=$(xmllint --xpath 'string(/report/counter[@type="LINE"]/@covered)' "$REPORT_PATH")
          else
            MATCH=$(grep -o 'counter type="LINE" missed="[0-9]*" covered="[0-9]*"' "$REPORT_PATH" | tail -n 1)
            MISSED=$(echo "$MATCH" | sed -E 's/.*missed="([0-9]+)".*/\1/')
            COVERED=$(echo "$MATCH" | sed -E 's/.*covered="([0-9]+)".*/\1/')
          fi
          if [ -z "$MISSED" ] || [ -z "$COVERED" ]; then
            echo "Could not parse line coverage counters from $REPORT_PATH"
            exit 1
          fi

          TOTAL=$((MISSED+COVERED))
          PCT=$(awk -v c="$COVERED" -v t="$TOTAL" 'BEGIN {if (t == 0) print "0.00"; else printf "%.2f", (c/t)*100}')
          echo "Coverage: ${PCT}% (${COVERED}/${TOTAL})"
          awk -v pct="$PCT" -v min="$MIN_LINE_COVERAGE" 'BEGIN { exit (pct >= min) ? 0 : 1 }'

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            app/build/reports/jacoco/jacocoTestReport/html

      - name: Notify Telegram (quality checks)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi
          MESSAGE="MyBest CI - quality_checks: ${{ job.status }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

  upload_dev_apk:
    needs: quality_checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Create keystore.properties file
        run: printf '%s' "${{ secrets.JUST_VERONICA }}" > keystore.properties

      - name: JUST CHILL
        run: |
          mkdir -p key
          echo "${{ secrets.JUST_CHILL }}" | base64 --decode > key/just_chill_key.p12

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build APK
        run: |
          BUILD_TASK=":app:assembleQa"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.release_build }}" = "true" ]; then
            BUILD_TASK=":app:assembleRelease"
          fi
          echo "Running $BUILD_TASK"
          ./gradlew "$BUILD_TASK"

      - name: Get APK path
        id: releaseApk
        run: |
          APK_DIR="app/build/outputs/apk/qa"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.release_build }}" = "true" ]; then
            APK_DIR="app/build/outputs/apk/release"
          fi
          APK_PATH=$(ls -1 "$APK_DIR"/*.apk | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in $APK_DIR"
            exit 1
          fi
          echo "release=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload release APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.FIREBASE_RELEASE_APP_ID}}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: Yolo
          file: ${{ steps.releaseApk.outputs.release }}

      - name: Notify Telegram (upload apk)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi
          MESSAGE="MyBest CI - upload_dev_apk: ${{ job.status }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          APK: ${{ steps.releaseApk.outputs.release }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
